<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Настройка профиля 3</title>
    <style>
        body { font-family: Arial; padding: 16px; background: #f5f5f5; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 16px; padding: 20px; }
        h1 { text-align: center; color: #333; }
        .lesson { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ddd; }
        .lesson h3 { margin: 0 0 10px 0; color: #4CAF50; }
        .time-input { display: flex; gap: 10px; }
        .time-input input { flex: 1; padding: 8px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; }
        .btn { background: #4CAF50; color: white; padding: 14px; border: none; border-radius: 12px; font-size: 16px; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-back { background: #666; display: block; text-align: center; text-decoration: none; margin-top: 10px; color: white; padding: 14px; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Настройка профиля 3 (Среда)</h1>
        
        <form action="/SetTimers" method="get">
            <input type="hidden" name="pName" value="3">
            <div id="lessons-container"></div>
            <button type="submit" class="btn">💾 Сохранить</button>
        </form>
        
        <a href="/" class="btn-back">🏠 На главную</a>
    </div>
    
    <script>
        // Запрашиваем данные ДЛЯ ЭТОГО ПРОФИЛЯ (номер 1)
        fetch('/get_profile?num=3')
            .then(response => response.json())
            .then(data => {
                let html = '';
                for (let i = 1; i <= 12; i++) {
                    html += `
                        <div class="lesson">
                            <h3>📖 Урок ${i}</h3>
                            <div class="time-input">
                                <input type="time" name="start${i}" value="${data['start'+i] || ''}">
                                <input type="time" name="stop${i}" value="${data['stop'+i] || ''}">
                            </div>
                        </div>
                    `;
                }
                document.getElementById('lessons-container').innerHTML = html;
            });
    </script>
</body>
</html>
